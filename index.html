<!DOCTYPE html>
<html lang="zh-CN">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>仓库库位看板</title>
 <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
 <style>
 *{margin:0;padding:0;box-sizing:border-box}
 body{background:#0a0e1a;font-family:Microsoft YaHei,PingFang SC,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none}
 header{background:#0d1525;border-bottom:2px solid #1a3a5c;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
 h1{font-size:18px;color:#4cc9f0;font-weight:900}
 .header-left{display:flex;align-items:center;gap:16px}
 .file-btn{display:flex;align-items:center;gap:8px;background:#1a3a5c;color:#4cc9f0;border:1px solid #4cc9f0;padding:7px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:bold;transition:all .2s}
 .file-btn:hover{background:#0a2040;box-shadow:0 0 12px rgba(76,201,240,.3)}
 .file-btn input[type="file"]{display:none}
 .file-name{color:#888;font-size:12px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
 .stats{display:flex;gap:20px;font-size:13px;color:#666}
 .stats span{color:#4cc9f0;font-weight:bold}
 .btn{background:#e94560;color:#fff;border:none;padding:7px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:bold}
 .btn:hover{background:#ff6b8a}
 .main{flex:1;display:flex;overflow:hidden}
 .board{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:20px;gap:12px;overflow:auto}
 .shelf{background:linear-gradient(180deg,#0d1f38,#0a1830);border:2px solid #4cc9f0;border-radius:12px;padding:16px 20px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:6px;min-width:300px}
 .shelf:hover{border-color:#e94560;background:linear-gradient(180deg,#1a0a28,#150a20);transform:scale(1.02);box-shadow:0 8px 24px rgba(233,69,96,.2)}
 .shelf-title{font-size:20px;font-weight:900;color:#4cc9f0;letter-spacing:2px}
 .shelf-sub{font-size:12px;color:#4a6080}
 .shelf-layers{font-size:11px;color:#2a4a6a;margin-top:4px}
 .layer-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
 .mini-slot{width:28px;height:20px;border-radius:3px;border:1px solid;display:flex;align-items:center;justify-content:center;font-size:8px}
 .ms-occ{border-color:#4cc9f0;background:#0a2040;color:#4cc9f0}
 .ms-empty{border-color:#1e2d3d;background:#111827;color:#334}
 .ms-low{border-color:#f4d03f;background:#2a2200;color:#f4d03f}
 .ms-crit{border-color:#e74c3c;background:#2a0000;color:#e74c3c;animation:pulse 1.5s infinite}
 @keyframes pulse{0%,100%{box-shadow:0 0 0 rgba(231,76,60,0)}50%{box-shadow:0 0 8px rgba(231,76,60,.4)}}
 .panel{width:360px;background:#0d1f38;border-left:2px solid #1a3a5c;padding:20px;overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column}
 .panel-title{font-size:15px;color:#4cc9f0;font-weight:900;padding-bottom:12px;border-bottom:1px solid #1a3a5c;margin-bottom:16px}
 .panel-hint{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#2a3a5a;font-size:14px;gap:10px;text-align:center}
 .panel-hint-icon{font-size:48px;opacity:.3}
 .layer-list{display:flex;flex-direction:column;gap:8px}
 .layer-card{background:#0a1830;border:1px solid #1a3a5c;border-radius:10px;padding:12px 14px;cursor:pointer;transition:all .2s}
 .layer-card:hover{border-color:#4cc9f0;background:#0a2040}
 .layer-card-title{font-size:13px;font-weight:900;color:#4cc9f0;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
 .layer-card-count{font-size:11px;color:#888}
 .pos-grid{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
 .pos-dot{width:26px;height:26px;border-radius:5px;border:1px solid;display:flex;align-items:center;justify-content:center;font-size:8px;cursor:pointer;transition:all .15s}
 .pos-dot:hover{transform:scale(1.15)}
 .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:500;display:none;align-items:center;justify-content:center}
 .modal-overlay.show{display:flex}
 .modal{background:linear-gradient(135deg,#0d1f38,#0a1628);border:2px solid #4cc9f0;border-radius:16px;width:460px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.6);overflow:hidden}
 .modal-header{background:#0a2040;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1a3a5c}
 .modal-header h2{font-size:16px;color:#4cc9f0;font-weight:900}
 .modal-close{background:none;border:none;color:#888;font-size:22px;cursor:pointer}
 .modal-close:hover{color:#e94560}
 .modal-body{padding:18px;display:flex;flex-direction:column;gap:12px}
 .modal-img{width:100%;height:140px;background:#050810;border:1px solid #1a3a5c;border-radius:8px;display:flex;align-items:center;justify-content:center;overflow:hidden}
 .modal-img img{max-width:100%;max-height:130px;object-fit:contain}
 .modal-img .no-img{color:#2a3a5a;font-size:13px}
 .modal-row{display:flex;gap:12px}
 .modal-label{font-size:11px;color:#4a6080;text-transform:uppercase;letter-spacing:1px;width:56px;flex-shrink:0;padding-top:2px}
 .modal-value{font-size:14px;color:#e0e0e0;font-weight:700;flex:1}
 .modal-value.highlight{color:#4cc9f0;font-size:18px}
 .modal-badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:12px;font-weight:900}
 .badge-occ{background:#0a2040;color:#4cc9f0;border:1px solid #4cc9f0}
 .badge-empty{background:#1a1a1a;color:#444;border:1px solid #333}
 .badge-low{background:#2a2000;color:#f4d03f;border:1px solid #f4d03f}
 .badge-critical{background:#2a0000;color:#e74c3c;border:1px solid #e74c3c;animation:badge-blink 1.5s infinite}
 @keyframes badge-blink{0%,100%{opacity:1}50%{opacity:.6}}
 .modal-divider{height:1px;background:#0f3460}
 .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#0d1f38;border:2px solid #4cc9f0;color:#4cc9f0;padding:8px 22px;border-radius:10px;font-size:13px;opacity:0;transition:all .35s;pointer-events:none;z-index:9999}
 .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
 .tip{text-align:center;font-size:11px;color:#2a3a5a;padding:8px;width:100%}
 .empty-board{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:#2a3a5a;font-size:14px;text-align:center}
 .empty-board-icon{font-size:64px;opacity:.3}
 .data-info{color:#4cc9f0;font-size:12px;background:#0a2040;border:1px solid #1a3a5c;border-radius:8px;padding:10px 16px;margin-top:4px}
 </style>
</head>
<body>
<header>
 <div class="header-left">
   <h1>📦 仓库库位看板</h1>
   <label class="file-btn" id="fileBtn">
    📂 选择Excel文件
    <input type="file" accept=".xlsx,.xls" id="fileInput" />
   </label>
   <span class="file-name" id="fileName"></span>
 </div>
 <div class="stats">总库位 <span id="s-total">0</span> · 已占用 <span id="s-occ" style="color:#27ae60">0</span> · 告警 <span id="s-alert" style="color:#e74c3c">0</span></div>
 <button class="btn" onclick="document.getElementById('fileInput').click()">🔄 重新加载</button>
</header>
<div class="main">
 <div class="board" id="board">
   <div class="empty-board" id="emptyBoard">
     <div class="empty-board-icon">📂</div>
     <div>请选择 Excel 数据源文件</div>
     <div class="data-info">支持 .xlsx / .xls 格式<br>表头需包含：料号、库位、品名、规格、可用量</div>
   </div>
   <div class="tip" id="boardTip" style="display:none">👆 点击货架 → 选择层数 → 点击货位查看详情</div>
 </div>
 <div class="panel">
   <div class="panel-title" id="panelTitle">📃 库位详情</div>
   <div class="panel-hint" id="panelHint"><div class="panel-hint-icon">👆</div><div>点击左侧货架<br>查看层数和货位</div></div>
   <div class="layer-list" id="layerList"></div>
 </div>
</div>
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
 <div class="modal" onclick="event.stopPropagation()">
   <div class="modal-header">
     <h2 id="modalTitle">📦 货位详情</h2>
     <button class="modal-close" onclick="closeModal()">×</button>
   </div>
   <div class="modal-body">
     <div class="modal-img" id="modalImg"><div class="no-img">暂无图片</div></div>
     <div class="modal-row"><div class="modal-label">库位</div><div class="modal-value highlight" id="m-code">-</div></div>
     <div class="modal-row"><div class="modal-label">料号</div><div class="modal-value" id="m-itemno">-</div></div>
     <div class="modal-row"><div class="modal-label">品名</div><div class="modal-value" id="m-name">-</div></div>
     <div class="modal-row"><div class="modal-label">规格</div><div class="modal-value" id="m-spec">-</div></div>
     <div class="modal-row"><div class="modal-label">可用量</div><div class="modal-value" id="m-qty">-</div></div>
     <div class="modal-divider"></div>
     <div class="modal-row"><div class="modal-label">备注</div><div class="modal-value" id="m-note" style="font-size:12px;color:#6a8aaa">-</div></div>
   </div>
 </div>
</div>
<div class="toast" id="toast"></div>
<script>
// ===== Excel 数据键名（兼容多种命名方式）=====
var KEY_CODE = ["库位", "库位编码", "货位", "库位编号", "位置"];
var KEY_ITEMNO = ["料号", "物料编号", "编码", "SKU", "商品编号"];
var KEY_NAME = ["品名", "物料名称", "名称", "名称", "商品名称"];
var KEY_SPEC = ["规格", "规格型号", "型号", "规格型号"];
var KEY_QTY = ["可用量", "库存量", "数量", "可用库存", "当前库存"];
var KEY_IMG = ["图片", "物料图片", "图片路径", "照片", "图片URL"];
var KEY_NOTE = ["备注", "备注信息", "说明", "备注说明"];

// ===== 全局数据 =====
var RAW_DATA = [];   // 原始行数据
var DATA = {};       // 按库位编码索引

// ===== 通用字段查找 =====
function findKey(row, candidates) {
  for (var k of candidates) {
    if (row[k] !== undefined && row[k] !== null && String(row[k]).trim() !== "") return k;
  }
  return null;
}

function getVal(row, candidates, def) {
  var k = findKey(row, candidates);
  return k ? (String(row[k]).trim() || def) : def;
}

// ===== 库位编码转换：A-2-1 → A-L2-P001 =====
function convertCode(raw) {
  if (!raw) return null;
  var s = String(raw).trim().toUpperCase();
  var m = s.match(/^([A-Z])-(\d+)-(\d+)$/);
  if (!m) {
    // 尝试旧格式 A-L1-P001
    if (/^[A-Z]-L\d+-P\d+$/.test(s)) return s;
    return null;
  }
  var shelf = m[1];
  var layer = parseInt(m[2]);
  var pos = parseInt(m[3]);
  return shelf + "-L" + layer + "-P" + String(pos).padStart(3, "0");
}

// ===== 从 Excel 行构建库位数据 =====
function buildItem(row) {
  var code = convertCode(getVal(row, KEY_CODE, ""));
  if (!code) return null;
  var qty = parseFloat(getVal(row, KEY_QTY, "0")) || 0;
  var name = getVal(row, KEY_NAME, "");
  return {
    code: code,
    itemno: getVal(row, KEY_ITEMNO, ""),
    name: name,
    spec: getVal(row, KEY_SPEC, ""),
    qty: qty,
    img: getVal(row, KEY_IMG, ""),
    note: getVal(row, KEY_NOTE, ""),
    // 原始行，保留所有未识别字段
    _raw: row,
    // 从库位编码提取货架和层
    shelf: code.split("-")[0],
    layer: parseInt(code.split("-L")[1].split("-")[0])
  };
}

// ===== 加载 Excel 文件 =====
function loadExcel(file) {
  document.getElementById("fileName").textContent = file.name;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = new Uint8Array(e.target.result);
      var workbook = XLSX.read(data, {type: "array", cellDates: true});
      var firstSheet = workbook.Sheets[workbook.SheetNames[0]];
      var json = XLSX.utils.sheet_to_json(firstSheet, {defval: ""});
      
      if (json.length === 0) {
        showToast("⚠️ Excel 文件为空");
        return;
      }

      // 构建数据
      RAW_DATA = json;
      DATA = {};
      var shelves = new Set();

      for (var i = 0; i < json.length; i++) {
        var item = buildItem(json[i]);
        if (item) {
          DATA[item.code] = item;
          shelves.add(item.shelf);
        }
      }

      var shelfList = Array.from(shelves).sort();
      console.log("解析完成：", Object.keys(DATA).length, "条, 货架:", shelfList);

      renderBoard(shelfList);
      updateStats();
      showToast("✅ 加载成功，共 " + Object.keys(DATA).length + " 条数据 (" + file.name + ")");
    } catch(err) {
      showToast("❌ 解析失败：" + err.message);
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

// ===== 渲染货架面板 =====
function renderBoard(shelfList) {
  var board = document.getElementById("board");
  var empty = document.getElementById("emptyBoard");
  var tip = document.getElementById("boardTip");
  if (empty) empty.style.display = "none";
  tip.style.display = "block";

  // 清除旧货架
  var oldShelves = board.querySelectorAll(".shelf");
  for (var s = 0; s < oldShelves.length; s++) oldShelves[s].remove();

  for (var si = 0; si < shelfList.length; si++) {
    var shelf = shelfList[si];
    var shelfDiv = document.createElement("div");
    shelfDiv.className = "shelf";
    shelfDiv.id = "shelf-" + shelf;
    shelfDiv.onclick = (function(s) { return function() { showLayers(s); }; })(shelf);

    // 计算层数范围
    var maxLayer = 1;
    for (var k in DATA) {
      if (DATA[k].shelf === shelf && DATA[k].layer > maxLayer) maxLayer = DATA[k].layer;
    }

    shelfDiv.innerHTML =
      '<div class="shelf-title">&#9670; ' + shelf + ' 区货架</div>' +
      '<div class="shelf-sub">' + maxLayer + '层</div>' +
      '<div class="shelf-layers">点击进入</div>' +
      '<div class="layer-row" id="shelf-' + shelf + '-preview"></div>';
    board.appendChild(shelfDiv);
  }

  // 渲染每个货架的层预览
  for (var si = 0; si < shelfList.length; si++) {
    renderPreview(shelfList[si]);
  }
}

// ===== 渲染层预览色块 =====
function renderPreview(shelf) {
  var el = document.getElementById("shelf-" + shelf + "-preview");
  if (!el) return;
  el.innerHTML = "";

  var maxLayer = 1;
  for (var k in DATA) {
    if (DATA[k].shelf === shelf && DATA[k].layer > maxLayer) maxLayer = DATA[k].layer;
  }

  for (var l = 1; l <= maxLayer; l++) {
    var its = getLayerItems(shelf, l);
    var st = calcStats(its);
    var cls = st.crit > 0 ? "ms-crit" : st.low > 0 ? "ms-low" : st.occ > 0 ? "ms-occ" : "ms-empty";
    var dot = document.createElement("div");
    dot.className = "mini-slot " + cls;
    dot.textContent = "L" + l;
    dot.title = "第" + l + "层：" + st.occ + "/" + its.length + " 已占用";
    el.appendChild(dot);
  }
}

// ===== 获取某货架某层的货位 =====
function getLayerItems(shelf, layer) {
  var result = [];
  for (var k in DATA) {
    if (DATA[k].shelf === shelf && DATA[k].layer === layer) result.push(DATA[k]);
  }
  return result.sort(function(a, b) {
    var pa = parseInt(a.code.split("-P")[1]);
    var pb = parseInt(b.code.split("-P")[1]);
    return pa - pb;
  });
}

// ===== 计算层统计 =====
function calcStats(items) {
  var occ = 0, crit = 0, low = 0;
  for (var i = 0; i < items.length; i++) {
    var q = items[i].qty || 0;
    var n = items[i].name || "";
    if (n && q > 0) occ++;
    if (n && q > 0 && q <= 10) crit++;
    if (n && q > 10 && q <= 50) low++;
  }
  return { occ: occ, crit: crit, low: low };
}

// ===== 右侧层列表 =====
function showLayers(shelf) {
  if (Object.keys(DATA).length === 0) { showToast("⚠️ 请先加载 Excel 数据"); return; }
  document.getElementById("panelHint").style.display = "none";
  var list = document.getElementById("layerList");
  list.innerHTML = "";
  document.getElementById("panelTitle").textContent = "📋 " + shelf + " 区货架 · 选择层数";

  var maxLayer = 1;
  for (var k in DATA) {
    if (DATA[k].shelf === shelf && DATA[k].layer > maxLayer) maxLayer = DATA[k].layer;
  }

  for (var L = 1; L <= maxLayer; L++) {
    var its = getLayerItems(shelf, L);
    if (its.length === 0) continue;
    var st = calcStats(its);

    var card = document.createElement("div");
    card.className = "layer-card";
    card.style.cssText = "background:#0a1830;border:1px solid #1a3a5c;border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer";

    var titleRow = document.createElement("div");
    titleRow.style.cssText = "font-size:13px;font-weight:900;color:#4cc9f0;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between";

    var left = document.createElement("span");
    left.innerHTML = "<span style='font-size:10px;color:#4cc9f0;margin-right:6px'>▶</span>第 " + L + " 层";

    var countSpan = document.createElement("span");
    countSpan.style.cssText = "font-size:11px;color:#888";
    countSpan.innerHTML = "<span style='color:#27ae60'>" + st.occ + "</span>/" + its.length +
      (st.crit > 0 ? " <span style='color:#e74c3c'>⚠️" + st.crit + "</span>" : "") +
      (st.low > 0 ? " <span style='color:#f39c12'>⚡" + st.low + "</span>" : "");

    left.appendChild(countSpan);
    titleRow.appendChild(left);

    var arrow = document.createElement("span");
    arrow.textContent = "▶";
    arrow.style.cssText = "font-size:10px;color:#4cc9f0;display:inline-block;transition:transform .2s";
    titleRow.appendChild(arrow);

    card.appendChild(titleRow);

    var grid = document.createElement("div");
    grid.style.cssText = "display:flex;flex-wrap:wrap;gap:5px";

    for (var j = 0; j < its.length; j++) {
      var item = its[j];
      var q = item.qty || 0;
      var n = item.name || "";
      var empty = !n || q === 0;
      var pnum = parseInt(item.code.split("-P")[1]);
      var cls = empty ? "ms-empty" : q <= 10 ? "ms-crit" : q <= 50 ? "ms-low" : "ms-occ";

      var dot = document.createElement("div");
      dot.style.cssText = "width:26px;height:26px;border-radius:5px;border:1px solid;display:flex;align-items:center;justify-content:center;font-size:8px;cursor:pointer;transition:all .15s;";
      if (cls === "ms-empty") dot.style.cssText += "border-color:#1e2d3d;background:#111827;color:#334;";
      else if (cls === "ms-crit") dot.style.cssText += "border-color:#e74c3c;background:#2a0000;color:#e74c3c;animation:pulse 1.5s infinite;";
      else if (cls === "ms-low") dot.style.cssText += "border-color:#f4d03f;background:#2a2200;color:#f4d03f;";
      else dot.style.cssText += "border-color:#4cc9f0;background:#0a2040;color:#4cc9f0;";
      dot.textContent = (pnum < 10 ? "0" : "") + pnum;
      dot.title = empty ? item.code + " 空" : item.code + " " + n + " x" + q;
      dot.onclick = (function(it) {
        return function(e) {
          e.stopPropagation();
          showModal(it);
        };
      })(item);
      dot.onmouseover = function() { this.style.transform = "scale(1.15)"; };
      dot.onmouseout = function() { this.style.transform = "scale(1)"; };
      grid.appendChild(dot);
    }

    card.appendChild(grid);
    card._grid = grid;
    card._arrow = arrow;

    card.onclick = function() {
      var isHidden = this._grid.style.display === "none" || this._grid.style.display === "";
      this._grid.style.display = isHidden ? "flex" : "none";
      this._arrow.textContent = isHidden ? "▼" : "▶";
    };
    card.onmouseover = function() {
      this.style.borderColor = "#4cc9f0";
      this.style.background = "#0a2040";
    };
    card.onmouseout = function() {
      this.style.borderColor = "#1a3a5c";
      this.style.background = "#0a1830";
    };

    list.appendChild(card);
  }
}

// ===== 弹窗详情 =====
function showModal(item) {
  var q = item.qty || 0;
  var n = item.name || "";
  var empty = !n || q === 0;

  document.getElementById("modalTitle").textContent = "📦 " + item.code;
  document.getElementById("m-code").textContent = item.code;
  document.getElementById("m-itemno").textContent = item.itemno || "-";
  document.getElementById("m-name").textContent = empty ? "(空库位)" : n;
  document.getElementById("m-spec").textContent = item.spec || "-";
  document.getElementById("m-qty").textContent = empty ? "-" : q + (item._raw && item._raw["单位"] ? " " + item._raw["单位"] : "");
  document.getElementById("m-note").textContent = item.note || "无";

  var imgPath = item.img || "";
  document.getElementById("modalImg").innerHTML = imgPath
    ? "<img src='" + imgPath + "' />"
    : "<div class='no-img'>暂无图片</div>";
  
  document.getElementById("modalOverlay").classList.add("show");
}

function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById("modalOverlay").classList.remove("show");
}

// ===== 更新统计 =====
function updateStats() {
  var all = Object.keys(DATA).map(function(k) { return DATA[k]; });
  var occ = 0, alert = 0;
  for (var i = 0; i < all.length; i++) {
    var q = all[i].qty || 0;
    var n = all[i].name || "";
    if (n && q > 0) occ++;
    if (n && q > 0 && q <= 50) alert++;
  }
  document.getElementById("s-total").textContent = all.length;
  document.getElementById("s-occ").textContent = occ;
  document.getElementById("s-alert").textContent = alert;
}

// ===== Toast 提示 =====
function showToast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(function() { t.classList.remove("show"); }, 3000);
}

// ===== 事件绑定 =====
document.getElementById("fileInput").addEventListener("change", function(e) {
  var file = e.target.files[0];
  if (file) loadExcel(file);
});

document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") closeModal();
});

// ===== 自动检测本地 Excel 文件 =====
(function autoLoadLocalExcel() {
  var xhr = new XMLHttpRequest();
  xhr.open("GET", "data.xlsx?t=" + Date.now(), true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4 && xhr.status === 200) {
      try {
        var data = new Uint8Array(xhr.response);
        var workbook = XLSX.read(data, {type: "array"});
        var firstSheet = workbook.Sheets[workbook.SheetNames[0]];
        var json = XLSX.utils.sheet_to_json(firstSheet, {defval: ""});
        RAW_DATA = json;
        DATA = {};
        var shelves = new Set();
        for (var i = 0; i < json.length; i++) {
          var item = buildItem(json[i]);
          if (item) {
            DATA[item.code] = item;
            shelves.add(item.shelf);
          }
        }
        var shelfList = Array.from(shelves).sort();
        document.getElementById("fileName").textContent = "data.xlsx (已自动加载)";
        renderBoard(shelfList);
        updateStats();
        showToast("✅ 自动加载 data.xlsx，共 " + Object.keys(DATA).length + " 条");
      } catch(e) {
        console.log("自动加载 xlsx 失败，尝试加载 data.json:", e.message);
        // 降级尝试 data.json（兼容旧版）
        var xhr2 = new XMLHttpRequest();
        xhr2.open("GET", "data.json?t=" + Date.now(), true);
        xhr2.onreadystatechange = function() {
          if (xhr2.readyState === 4 && xhr2.status === 200) {
            try {
              var json = JSON.parse(xhr2.responseText);
              DATA = {};
              for (var i = 0; i < json.length; i++) {
                var item = {
                  code: json[i]["库位编码"] || json[i]["库位"] || json[i]["code"] || "",
                  itemno: json[i]["料号"] || json[i]["itemno"] || "",
                  name: json[i]["物料名称"] || json[i]["品名"] || "",
                  spec: json[i]["规格型号"] || json[i]["规格"] || "",
                  qty: parseFloat(json[i]["数量"] || json[i]["可用量"] || "0") || 0,
                  img: json[i]["物料图片路径"] || "",
                  note: json[i]["备注"] || "",
                  shelf: "",
                  layer: 0
                };
                if (!item.code) continue;
                var parts = item.code.split("-");
                item.shelf = parts[0] || "";
                var layerPart = item.code.match(/-L(\d+)-/);
                item.layer = layerPart ? parseInt(layerPart[1]) : 0;
                DATA[item.code] = item;
              }
              var shelves = new Set();
              for (var k in DATA) shelves.add(DATA[k].shelf);
              var shelfList = Array.from(shelves).sort();
              document.getElementById("fileName").textContent = "data.json (已自动加载)";
              renderBoard(shelfList);
              updateStats();
              showToast("✅ 自动加载 data.json，共 " + Object.keys(DATA).length + " 条");
            } catch(e2) {
              console.log("自动加载 data.json 失败:", e2.message);
            }
          }
        };
        xhr2.send();
      }
    }
  };
  xhr.send();
})();
</script>
