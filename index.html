<!DOCTYPE html>
<html lang="zh-CN">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>仓库库位看板</title>
 <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
 <style>
 *{margin:0;padding:0;box-sizing:border-box}
 body{background:#0a0e1a;font-family:Microsoft YaHei,PingFang SC,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none}
 header{background:#0d1525;border-bottom:2px solid #1a3a5c;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
 h1{font-size:18px;color:#4cc9f0;font-weight:900}
 .header-left{display:flex;align-items:center;gap:16px}
 .file-btn{display:flex;align-items:center;gap:8px;background:#1a3a5c;color:#4cc9f0;border:1px solid #4cc9f0;padding:7px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:bold;transition:all .2s}
 .file-btn:hover{background:#0a2040;box-shadow:0 0 12px rgba(76,201,240,.3)}
 .file-btn input[type="file"]{display:none}
 .file-name{color:#888;font-size:12px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
 .stats{display:flex;gap:20px;font-size:13px;color:#666}
 .stats span{color:#4cc9f0;font-weight:bold}
 .btn{background:#e94560;color:#fff;border:none;padding:7px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:bold}
 .btn:hover{background:#ff6b8a}
 .main{flex:1;display:flex;overflow:hidden}
 .board{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:20px;gap:12px;overflow:auto}
 .shelf{background:linear-gradient(180deg,#0d1f38,#0a1830);border:2px solid #4cc9f0;border-radius:12px;padding:16px 20px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:6px;min-width:300px}
 .shelf:hover{border-color:#e94560;background:linear-gradient(180deg,#1a0a28,#150a20);transform:scale(1.02);box-shadow:0 8px 24px rgba(233,69,96,.2)}
 .shelf-title{font-size:20px;font-weight:900;color:#4cc9f0;letter-spacing:2px}
 .shelf-sub{font-size:12px;color:#4a6080}
 .shelf-layers{font-size:11px;color:#2a4a6a;margin-top:4px}
 .layer-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
 .mini-slot{width:28px;height:20px;border-radius:3px;border:1px solid;display:flex;align-items:center;justify-content:center;font-size:8px;position:relative}
 .ms-occ{border-color:#4cc9f0;background:#0a2040;color:#4cc9f0}
 .ms-empty{border-color:#3a4a5a;background:#1a2535;color:#5a6a7a}
 .ms-low{border-color:#f4d03f;background:#2a2200;color:#f4d03f}
 .ms-crit{border-color:#e74c3c;background:#2a0000;color:#e74c3c;animation:pulse 1.5s infinite}

 @keyframes pulse{0%,100%{box-shadow:0 0 0 rgba(231,76,60,0)}50%{box-shadow:0 0 8px rgba(231,76,60,.4)}}

 .multi-dot{position:absolute;bottom:1px;right:1px;width:7px;height:7px;background:#9b59b6;border-radius:50%;font-size:0;line-height:0}
 .panel{width:360px;background:#0d1f38;border-left:2px solid #1a3a5c;padding:20px;overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column}
 .panel-title{font-size:15px;color:#4cc9f0;font-weight:900;padding-bottom:12px;border-bottom:1px solid #1a3a5c;margin-bottom:16px}
 .panel-hint{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#2a3a5a;font-size:14px;gap:10px;text-align:center}
 .panel-hint-icon{font-size:48px;opacity:.3}
 .layer-list{display:flex;flex-direction:column;gap:8px}
 .layer-card{background:#0a1830;border:1px solid #1a3a5c;border-radius:10px;padding:12px 14px;cursor:pointer;transition:all .2s}
 .layer-card:hover{border-color:#4cc9f0;background:#0a2040}
 .layer-card-title{font-size:13px;font-weight:900;color:#4cc9f0;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
 .layer-card-count{font-size:11px;color:#888}
 .pos-grid{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
 .pos-dot{width:26px;height:26px;border-radius:5px;border:1px solid;display:flex;align-items:center;justify-content:center;font-size:8px;cursor:pointer;transition:all .15s;position:relative}
 .pos-dot:hover{transform:scale(1.15)}
 .multi-badge{position:absolute;top:-5px;right:-5px;min-width:12px;height:12px;background:#9b59b6;color:#fff;border-radius:6px;font-size:7px;display:flex;align-items:center;justify-content:center;font-weight:bold;line-height:1;padding:0 2px}
 .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:500;display:none;align-items:center;justify-content:center}
 .modal-overlay.show{display:flex}
 .modal{background:linear-gradient(135deg,#0d1f38,#0a1628);border:2px solid #4cc9f0;border-radius:16px;width:480px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.6);overflow:hidden;max-height:85vh;display:flex;flex-direction:column}
 .modal-header{background:#0a2040;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1a3a5c;flex-shrink:0}
 .modal-header h2{font-size:16px;color:#4cc9f0;font-weight:900}
 .modal-close{background:none;border:none;color:#888;font-size:22px;cursor:pointer}
 .modal-close:hover{color:#e94560}
 .modal-body{padding:18px;display:flex;flex-direction:column;gap:12px;overflow-y:auto}
 .modal-location{background:#0a2040;border:1px solid #1a3a5c;border-radius:8px;padding:10px 14px;font-size:13px;color:#4cc9f0;font-weight:bold;text-align:center;flex-shrink:0}
 .modal-items-count{font-size:11px;color:#9b59b6;font-weight:normal;margin-left:8px}
 .modal-item-card{background:#0a1628;border:1px solid #1a3a5c;border-radius:8px;padding:10px 12px;transition:all .2s}
 .modal-item-card:hover{border-color:#4cc9f0}
 .modal-item-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
 .modal-item-name{font-size:13px;color:#4cc9f0;font-weight:bold;flex:1}
 .modal-item-qty{font-size:13px;font-weight:bold;padding:2px 8px;border-radius:10px}
 .modal-item-qty.low{background:#2a2000;color:#f4d03f}
 .modal-item-qty.crit{background:#2a0000;color:#e74c3c;animation:badge-blink 1.5s infinite}
 .modal-item-qty.ok{background:#0a2040;color:#27ae60}
 .modal-item-qty.empty{background:#111827;color:#444}
 .modal-item-row{display:flex;gap:12px;font-size:12px;color:#6a8aaa}
 .modal-item-row span{color:#4cc9f0;font-weight:600}
 .modal-divider{height:1px;background:#0f3460;flex-shrink:0}
 .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#0d1f38;border:2px solid #4cc9f0;color:#4cc9f0;padding:8px 22px;border-radius:10px;font-size:13px;opacity:0;transition:all .35s;pointer-events:none;z-index:9999}
 .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
 .tip{text-align:center;font-size:11px;color:#2a3a5a;padding:8px;width:100%}
 .header-actions{display:flex;align-items:center;gap:8px}
 .detail-btn-wrap{margin-left:12px;display:inline-block}
 .detail-btn{background:#1a0a20;border:1px solid #e74c3c;color:#e74c3c;border-radius:6px;padding:3px 10px;font-size:12px;cursor:pointer;font-weight:bold;transition:all .2s}
 .detail-btn:hover{background:#2a0010;box-shadow:0 0 8px rgba(231,76,60,.2)}
 .detail-btn .badge{display:inline-block;background:#e74c3c;color:#fff;border-radius:10px;font-size:10px;padding:0 5px;margin-left:4px;line-height:16px;min-width:16px;text-align:center}
 .stats-row{display:flex;align-items:center;gap:0;line-height:1}
 .header-btn{background:#1a3a5c;color:#4cc9f0;border:1px solid #4cc9f0;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:bold;transition:all .2s;white-space:nowrap}
 .header-btn:hover{background:#0a2040;box-shadow:0 0 10px rgba(76,201,240,.25)}
 .header-btn.warn{color:#f39c12;border-color:#f39c12}
 .header-btn.warn:hover{background:#2a2000;box-shadow:0 0 10px rgba(243,156,18,.25)}
 .header-btn.warn.has-alert{color:#e74c3c;border-color:#e74c3c;animation:btn-blink 2s infinite}
 @keyframes btn-blink{0%,100%{opacity:1}50%{opacity:.7}}
 .safe-table{width:100%;border-collapse:collapse;font-size:12px}
 .safe-table th{background:#0a2040;color:#4cc9f0;padding:8px 10px;text-align:left;font-weight:900;border-bottom:1px solid #1a3a5c;position:sticky;top:0}
 .safe-table td{padding:8px 10px;border-bottom:1px solid #0f1a2e;color:#c0d0e0;vertical-align:middle}
 .safe-table tr:hover td{background:#0a1830}
 .safe-table .col-loc{color:#4cc9f0;font-weight:bold;white-space:nowrap}
 .safe-table .col-qty{text-align:right;font-weight:bold}
 .safe-table .crit .col-qty{color:#e74c3c}
 .safe-table .low .col-qty{color:#f39c12}
 .safe-table .col-safe{color:#888;text-align:right}
 .safe-table .col-itemno{color:#9b59b6;font-size:11px}
 .safe-modal-msg{text-align:center;padding:20px;color:#2a3a5a;font-size:14px}
 .safe-modal-msg.ok{color:#27ae60}
 .search-table{width:100%;border-collapse:collapse;font-size:14px}
 .search-table th{background:#0a2040;color:#4cc9f0;padding:10px 12px;font-size:13px;border-bottom:1px solid #1a3a5c;position:sticky;top:0;z-index:10}
 .search-table td{padding:9px 12px;border-bottom:1px solid #0f1a2e;color:#e8eef4;vertical-align:middle}
 .search-table tr:hover td{background:#0a1830;cursor:pointer}
 .search-table .col-loc{color:#4cc9f0;font-weight:bold;white-space:nowrap}
 .search-table .col-qty{text-align:right;font-weight:bold}
 .search-table .col-itemno{color:#e0a0e0;font-size:12px}
 .search-table .truncated{max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
 .search-table .truncated:hover{max-width:none;white-space:normal;word-break:break-all}
 .search-hl{animation:search-pulse 1s ease-in-out 3;background:#ff7700;color:#000;font-weight:900;padding:0 3px;border-radius:3px;box-shadow:0 0 10px #ff9900;border:1px solid #ff9900;z-index:50}
@keyframes search-pulse{0%,100%{box-shadow:0 0 14px #ff9900}50%{box-shadow:0 0 24px #ffaa33}}
 .empty-board-icon{font-size:64px;opacity:.3}
 .data-info{color:#4cc9f0;font-size:12px;background:#0a2040;border:1px solid #1a3a5c;border-radius:8px;padding:10px 16px;margin-top:4px}
 .floor-plan-container{display:flex;flex-direction:column;align-items:center;padding:12px;width:100%;height:100%;overflow:auto}
 .floor-plan-svg{border-radius:8px;border:2px solid #1a3a5c;background:#0d1f38;cursor:pointer} .svg-wrap{position:relative;display:inline-block;overflow:visible}
 .floor-shelf{cursor:pointer}
 /* 货架视图焦点：橙色发光呼吸动画 */
 .shelf-focus{background:linear-gradient(135deg,#0a2a1a,#0d3520)!important;border-color:#ff9900!important;box-shadow:0 0 20px rgba(255,153,0,.35),inset 0 0 20px rgba(255,153,0,.05);animation:shelf-focus-pulse 2s ease-in-out infinite}
 @keyframes shelf-focus-pulse{0%,100%{box-shadow:0 0 16px rgba(255,153,0,.35),inset 0 0 16px rgba(255,153,0,.05)}50%{box-shadow:0 0 28px rgba(255,153,0,.6),inset 0 0 28px rgba(255,153,0,.1)}}
  /* 平面图焦点高亮矩形：橙色描边+呼吸脉冲动画 */
 .svg-shelf-focus{animation:svg-shelf-focus 2s ease-in-out infinite}
 @keyframes svg-shelf-focus{0%,100%{filter:drop-shadow(0 0 6px #ff9900)}50%{filter:drop-shadow(0 0 18px #ffaa33)}}

.shelf-focus{background:linear-gradient(135deg,#0a2a1a,#0d3520)!important;border-color:#ff9900!important;box-shadow:0 0 20px rgba(255,153,0,.35),inset 0 0 20px rgba(255,153,0,.05);animation:shelf-focus-pulse 2s ease-in-out infinite}
 @keyframes shelf-focus-pulse{0%,100%{box-shadow:0 0 16px rgba(255,153,0,.35),inset 0 0 16px rgba(255,153,0,.05)}50%{box-shadow:0 0 28px rgba(255,153,0,.6),inset 0 0 28px rgba(255,153,0,.1)}}
 /* 平面图SVG货架焦点动画 */
 .svg-shelf-focus{animation:svg-shelf-focus 2s ease-in-out infinite}
 @keyframes svg-shelf-focus{0%,100%{filter:drop-shadow(0 0 8px rgba(255,153,0,.7))}50%{filter:drop-shadow(0 0 22px rgba(255,180,0,.95))}}

 .floor-label{font-family:Microsoft YaHei,sans-serif;font-weight:bold;fill:#ffffff;pointer-events:none;font-size:20px}
 .floor-label.empty{fill:#4a6080}
 .floor-hint{color:#4a6080;font-size:12px;margin-top:8px;text-align:center}
 .floor-tip{position:absolute;background:rgba(13,31,56,.95);border:1px solid #1a3a5c;color:#ffffff;font-size:12px;padding:6px 12px;border-radius:6px;pointer-events:none;display:none;z-index:1000;white-space:nowrap}
 .header-btn{background:#1a3a5c;color:#4cc9f0;border:1px solid #4cc9f0;padding:7px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:bold;margin-left:8px}
 .header-btn:hover{background:#0a2040;box-shadow:0 0 12px rgba(76,201,240,.3)}
 </style>
</head>
<body>
<header>
 <div class="header-left">
   <h1>📦 仓库库位看板</h1>
   <label class="file-btn" id="fileBtn">
    📂 选择Excel文件
    <input type="file" accept=".xlsx,.xls" id="fileInput" />
   </label>
   <span class="file-name" id="fileName"></span>
 </div>
 <div class="stats stats-row">
   总库位 <span id="s-total">0</span> · 已占用 <span id="s-occ" style="color:#27ae60">0</span> · 空闲 <span id="s-empty" style="color:#4a6080">0</span> · 库存告警 <span id="s-alert" style="color:#e74c3c">0</span>
   <div class="detail-btn-wrap"><button class="detail-btn" id="safeAlertBtn" onclick="showSafeAlertModal()">明细 <span id="safeAlertBadge" class="badge"></span></button></div>
 </div>
 <button class="header-btn" onclick="showSearchModal()">🔍 查询</button>
 <button class="header-btn" onclick="toggleView()" id="viewToggleBtn">📐 平面图</button>
 <button class="header-btn" onclick="document.getElementById('fileInput').click()">🔄 刷新</button>
</header>
<div class="main">
 <div class="board" id="board">
   <div class="empty-board" id="emptyBoard">
     <div class="empty-board-icon">📂</div>
     <div>请选择 Excel 数据源文件</div>
     <div class="data-info">支持 .xlsx / .xls 格式<br>表头需包含：料号、库位、品名、规格、可用量<br><span style="color:#9b59b6">✅ 支持同库位存放多种物料</span></div>
   </div>
   <div class="tip" id="boardTip" style="display:none"></div>
 </div>
 <div class="floor-plan-container" id="floorPlanContainer" style="display:flex"></div>
 <div class="panel">
   <div class="panel-title" id="panelTitle">📃 库位详情</div>
   <div class="panel-hint" id="panelHint"><div class="panel-hint-icon">👆</div><div>点击左侧货架<br>查看层数和货位</div></div>
   <div class="layer-list" id="layerList"></div>
 </div>
</div>
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
 <div class="modal" onclick="event.stopPropagation()">
   <div class="modal-header">
     <h2 id="modalTitle">📦 货位详情</h2>
     <button class="modal-close" onclick="closeModal()">×</button>
   </div>
   <div class="modal-body" id="modalBody">
   </div>
 </div>
</div>
<div class="toast" id="toast"></div>
<div class="modal-overlay" id="searchOverlay">
 <div class="modal" style="width:900px;max-height:85vh" onclick="event.stopPropagation()">
  <div class="modal-header">
   <h2>🔍 库位查询</h2>
   <button class="modal-close" onclick="closeSearch()">×</button>
  </div>
  <div class="modal-body" style="padding:14px;gap:10px">
   <div style="display:flex;gap:8px;align-items:center">
    <input type="text" id="searchInput" placeholder="输入料号/品名/规格/库位/备注..." style="flex:1;background:#0a2040;border:1px solid #1a3a5c;color:#4cc9f0;padding:8px 12px;border-radius:8px;font-size:13px;outline:none" oninput="onSearchInput()" onkeydown="onSearchKeydown(event)" />
    <button class="header-btn" style="background:#0a2040" onclick="doSearch(true)">搜索</button>
   </div>
   <div id="searchHint" style="text-align:center;font-size:12px;color:#2a3a5a;padding:8px">输入关键词实时搜索，支持料号/品名/规格/库位/备注</div>
   <div id="searchBody" style="overflow-y:auto;height:460px"></div>
  </div>
 </div>
</div>
<script>
// ===== 字段名兼容列表（Excel表头可能的不同命名）=====
var KEY_CODE = ["库位", "库位编码", "货位", "库位编号", "位置"];
var KEY_ITEMNO = ["料号", "物料编号", "编码", "SKU", "商品编号"];
var KEY_NAME = ["品名", "物料名称", "名称", "商品名称"];
var KEY_SPEC = ["规格", "规格型号", "型号"];
var KEY_QTY = ["可用量", "库存量", "数量", "可用库存", "当前库存"];
var KEY_UNIT = ["单位", "计量单位", "UNIT", "单位(盒/根/个等)"];
var KEY_IMG = ["图片", "物料图片", "图片路径", "照片", "图片URL"];
var KEY_SAFE = ["安全库存", "安全库存量", "安全量", "最低库存", "最低库存量"];
var KEY_NOTE = ["备注", "备注信息", "说明"];

// ===== 全局数据 =====
// DATA[code] = { code, items: [...], shelf, layer, pos }
// items 数组支持同库位多物料
var DATA = {};

// ===== 字段查找工具 =====
function findKey(row, candidates) {
  // 1. 先精确匹配
  for (var k of candidates) {
    if (row[k] !== undefined && row[k] !== null && String(row[k]).trim() !== "") return k;
  }
  // 2. 模糊匹配：忽略所有空格、大小写
  var norm = function(s) { return String(s).replace(/\s+/g, "").toLowerCase(); };
  var candNorm = {};
  for (var ci = 0; ci < candidates.length; ci++) candNorm[norm(candidates[ci])] = candidates[ci];
  for (var rk in row) {
    var n = norm(rk);
    if (candNorm[n] && row[rk] !== undefined && row[rk] !== null && String(row[rk]).trim() !== "") return candNorm[n];
  }
  return null;
}
function getVal(row, candidates, def) {
  var k = findKey(row, candidates);
  return k ? (String(row[k]).trim() || def) : def;
}

// ===== 库位编码转换：同时返回原始格式和内部格式 =====
function convertCode(raw) {
  if (!raw) return { raw: null, code: null };
  var s = String(raw).trim();
  var m = s.match(/^([A-Z])-(\d+)-(\d+)$/);
  if (m) {
    var shelf = m[1];
    var layer = parseInt(m[2]);
    var pos = parseInt(m[3]);
    return { raw: s, code: shelf + "-L" + layer + "-P" + String(pos).padStart(3, "0") };
  }
  if (/^[A-Z]-L\d+-P\d+$/.test(s.toUpperCase())) {
    return { raw: s, code: s.toUpperCase() };
  }
  return { raw: s, code: null };
}

// ===== 渲染货位色块的状态 =====
// 优先级：空货位 > 告警 > 正常有货
function getSlotStatus(loc) {
  var items = loc.items;
  if (items.length === 0) return { cls: "ms-empty", tip: "空库位", color: "#5a6a7a" };
  var topCls = "ms-occ", topColor = "#4cc9f0", topTip = "";
  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    if (!it.name || it.qty === 0) continue;
    var safe = it.safeQty || 0;
    if (safe > 0 && it.qty < safe) {
      topCls = "ms-crit"; topColor = "#e74c3c";
      topTip = it.name + " x" + it.qty + " ⚠️低于安全库存";
      break;
    }
    if (safe > 0 && it.qty < safe * 2) {
      topCls = "ms-low"; topColor = "#f4d03f";
      topTip = it.name + " x" + it.qty;
    } else if (topCls !== "ms-crit") {
      topCls = "ms-occ"; topColor = "#4cc9f0";
      topTip = it.name + " x" + it.qty;
    }
  }
  var tip = topTip || (items.length > 1 ? "共" + items.length + "种物料" : "空库位");
  return { cls: topCls, tip: tip, color: topColor };
}

// ===== 加载 Excel =====
function loadExcel(file) {
  // 保存焦点货架，如果新数据中没有该货架会清空
  var prevFocus = _focusShelf;
  _focused = false;
  document.getElementById("fileName").textContent = file.name;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = new Uint8Array(e.target.result);
      var workbook = XLSX.read(data, {type: "array", cellDates: true});
      var firstSheet = workbook.Sheets[workbook.SheetNames[0]];
      var json = XLSX.utils.sheet_to_json(firstSheet, {defval: ""});
      
      if (json.length === 0) {
        showToast("⚠️ Excel 文件为空");
        return;
      }

      // 按库位编码分组
      DATA = {};
      var shelves = new Set();

      for (var i = 0; i < json.length; i++) {
        var row = json[i];
        var conv = convertCode(getVal(row, KEY_CODE, ""));
        if (!conv.code) continue;
        var code = conv.code;
        var disp = conv.raw;

        var qty = parseFloat(getVal(row, KEY_QTY, "0")) || 0;
        var name = getVal(row, KEY_NAME, "");
        var itemno = getVal(row, KEY_ITEMNO, "");
        var spec = getVal(row, KEY_SPEC, "");
        var unit = getVal(row, KEY_UNIT, "");
        var img = getVal(row, KEY_IMG, "");
        var note = getVal(row, KEY_NOTE, "");
        var safeQty = parseFloat(getVal(row, KEY_SAFE, "0")) || 0;

        var item = {
          itemno: itemno,
          name: name,
          spec: spec,
          qty: qty,
          unit: unit,
          safeQty: safeQty,
          img: img,
          note: note,
          _raw: row
        };

        if (!DATA[code]) {
          var parts = code.split("-");
          DATA[code] = {
            code: code,
            disp: disp,
            shelf: parts[0],
            layer: parseInt(parts[1].replace("L", "")),
            pos: parseInt(parts[2].replace("P", "")),
            items: []
          };
        }
        DATA[code].items.push(item);

        shelves.add(DATA[code].shelf);
      }

      var shelfList = Array.from(shelves).sort();
      var totalSlots = Object.keys(DATA).length;
      var totalItems = json.length;
      console.log("解析完成：", totalSlots, "个货位,", totalItems, "条物料记录, 货架:", shelfList);

      renderBoard(shelfList);
      // 清空右侧面板
      var list = document.getElementById("layerList");
      if (list) list.innerHTML = "";
      var pTitle = document.getElementById("panelTitle");
      if (pTitle) pTitle.textContent = "📃 库位详情";
      var pHint = document.getElementById("panelHint");
      if (pHint) pHint.style.display = "";
      // 平面图模式下重新渲染（更新颜色）
      // 检查焦点货架是否在新数据中存在，不存在则清空
      if (prevFocus) {
        var focusExists = false;
        for (var k in DATA) {
          if (DATA[k].shelf === prevFocus) { focusExists = true; break; }
        }
        if (!focusExists) _focusShelf = null;
      }
      if (_floorViewActive) {
        console.log('[loadExcel] 重新渲染平面图, _focusShelf=' + _focusShelf + ', _floorViewActive=' + _floorViewActive);
        renderFloorPlan();
      }
      updateStats();
      updateSafeAlertBtn();
      showToast("✅ 加载成功 " + totalSlots + " 货位/" + totalItems + " 物料 (" + file.name + ")");
    } catch(err) {
      showToast("❌ 解析失败：" + err.message);
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

// ===== 渲染货架 =====
function renderBoard(shelfList) {
  var board = document.getElementById("board");
  var empty = document.getElementById("emptyBoard");
  var tip = document.getElementById("boardTip");
  if (empty) empty.style.display = "none";
  tip.style.display = "block";

  var oldShelves = board.querySelectorAll(".shelf");
  for (var s = 0; s < oldShelves.length; s++) oldShelves[s].remove();

  for (var si = 0; si < shelfList.length; si++) {
    var shelf = shelfList[si];
    var maxLayer = 1;
    for (var k in DATA) {
      if (DATA[k].shelf === shelf && DATA[k].layer > maxLayer) maxLayer = DATA[k].layer;
    }

    var shelfDiv = document.createElement("div");
    shelfDiv.className = "shelf";
    if (_focusShelf === shelf) shelfDiv.className = "shelf shelf-focus";
    shelfDiv.id = "shelf-" + shelf;
    shelfDiv.onclick = (function(s) { return function() { showLayers(s); }; })(shelf);
    shelfDiv.innerHTML =
      '<div class="shelf-title">&#9670; ' + shelf + ' 区货架</div>' +
      '<div class="shelf-sub">' + maxLayer + '层</div>' +
      '<div class="shelf-layers">点击进入</div>' +
      '<div class="layer-row" id="shelf-' + shelf + '-preview"></div>';
    board.appendChild(shelfDiv);
  }

  for (var si = 0; si < shelfList.length; si++) {
    renderPreview(shelfList[si]);
  }
}

// ===== 渲染层预览 =====
function renderPreview(shelf) {
  var el = document.getElementById("shelf-" + shelf + "-preview");
  if (!el) return;
  el.innerHTML = "";

  var maxLayer = 1;
  for (var k in DATA) {
    if (DATA[k].shelf === shelf && DATA[k].layer > maxLayer) maxLayer = DATA[k].layer;
  }

  for (var l = 1; l <= maxLayer; l++) {
    var layerItems = getLayerSlots(shelf, l);
    var hasMulti = layerItems.some(function(loc) { return loc.items.length > 1; });
    var st = calcStatsForLayer(layerItems);
    var cls = st.crit > 0 ? "ms-crit" : st.low > 0 ? "ms-low" : st.occ > 0 ? "ms-occ" : "ms-empty";

    var dot = document.createElement("div");
    dot.className = "mini-slot " + cls;
    dot.textContent = "L" + l;
    dot.title = "第" + l + "层：" + st.occ + "/" + layerItems.length + " 已占用" + (hasMulti ? " (含多物料)" : "");
    el.appendChild(dot);
  }
}

// ===== 获取某货架某层所有货位 =====
function getLayerSlots(shelf, layer) {
  var result = [];
  for (var k in DATA) {
    if (DATA[k].shelf === shelf && DATA[k].layer === layer) result.push(DATA[k]);
  }
  return result.sort(function(a, b) { return a.pos - b.pos; });
}

// ===== 计算某层统计 =====
// items 这里传的是货位数组，不是物料数组
function calcStatsForLayer(locations) {
  var occ = 0, crit = 0, low = 0;
  for (var i = 0; i < locations.length; i++) {
    var items = locations[i].items;
    var hasOccupied = items.some(function(it) { return it.name && it.qty > 0; });
    var hasCrit = items.some(function(it) { var safe = it.safeQty || 0; return it.qty > 0 && safe > 0 && it.qty < safe; });
    var hasLow = items.some(function(it) { var safe = it.safeQty || 0; return it.qty > 0 && safe > 0 && it.qty < safe * 2; });
    if (hasOccupied) occ++;
    if (hasCrit) crit++;
    else if (hasLow) low++;
  }
  return { occ: occ, crit: crit, low: low };
}

// ===== 右侧层列表 =====
function showLayers(shelf) {

  document.getElementById("panelTitle").textContent = "📋 " + shelf + " 区货架 · 选择层数";

  var maxLayer = 1;

    if (DATA[k].shelf === shelf && DATA[k].layer > maxLayer) maxLayer = DATA[k].layer;
  }

  for (var L = 1; L <= maxLayer; L++) {
    var slots = getLayerSlots(shelf, L);

    var card = document.createElement("div");

    left.innerHTML = "<span style='font-size:10px;color:#4cc9f0;margin-right:6px'>▶</span>第 " + L + " 层";

      (st.crit > 0 ? " <span style='color:#e74c3c'>⚠️" + st.crit + "</span>" : "") +
      (st.low > 0 ? " <span style='color:#f39c12'>⚡" + st.low + "</span>" : "");

    var arrow = document.createElement("span");

    arrow.style.cssText = "font-size:10px;color:#4cc9f0;transition:transform .2s";
    titleRow.appendChild(arrow);
    card.appendChild(titleRow);

    var grid = document.createElement("div");
    grid.style.cssText = "display:flex;flex-wrap:wrap;gap:5px";

    for (var j = 0; j < slots.length; j++) {
      var loc = slots[j];
      var status = getSlotStatus(loc);
      var pnum = loc.pos;

      var dot = document.createElement("div");

      dot.style.cssText = baseCss;

        return function(e) {
          e.stopPropagation();
          showModal(l);
        };
      })(loc);

      // 多物料小圆点

        var badge = document.createElement("div");
        badge.className = "multi-badge";
        badge.textContent = loc.items.length;
        badge.style.cssText = "position:absolute;top:-4px;right:-4px;min-width:11px;height:11px;background:" + status.color + ";color:#fff;border-radius:5px;font-size:6px;display:flex;align-items:center;justify-content:center;font-weight:bold;line-height:1;padding:0 1px;box-shadow:0 0 4px rgba(0,0,0,.5)";
        dot.appendChild(badge);
      }

      dot.onmouseover = function() { this.style.transform = "scale(1.15)"; };

    }

      tag.style.color = belowSafe ? "#e74c3c" : "#4cc9f0";
      tag.style.borderColor = belowSafe ? "#e74c3c" : "#4cc9f0";

  // ===== 默认选中第一个有图片的物料 =====

  for (var i = 0; i < items.length; i++) {
    if (items[i].img && items[i].img !== "" && items[i].img !== "物料图片路径") {

      break;

  if (firstWithImg === -1) firstWithImg = 0;
  switchToItem(firstWithImg);

  document.getElementById("modalOverlay").classList.add("show");
}

function showSafeAlertModal() {
  console.log("showSafeAlertModal called");
  var overlay = document.getElementById("safeAlertOverlay");
  var body = document.getElementById("safeAlertBody");
  console.log("overlay:", overlay, "body:", body);
  if (Object.keys(DATA).length === 0) { showToast("⚠️ 请先加载数据"); return; }
  document.getElementById("safeAlertTitle").textContent = "⚠️ 库存不足明细";

  // 收集所有低于安全库存的物料
  var below = [];
  for (var k in DATA) {
    var loc = DATA[k];
    for (var i = 0; i < loc.items.length; i++) {
      var it = loc.items[i];
      if (!it.name || it.qty === 0) continue;
      var safe = it.safeQty || 0;
      if (safe > 0 && it.qty < safe) {
        below.push({
          loc: loc,
          it: it,
          deficit: safe - it.qty
        });
      }
    }
  }

  if (below.length === 0) {
    body.innerHTML = '<div class="safe-modal-msg ok">✅ 所有物料均高于安全库存，无告警</div>';
  } else {
    // 按缺口大小降序
    below.sort(function(a, b) { return b.deficit - a.deficit; });
    var html = '<table class="safe-table">' +
      '<thead><tr>' +
        '<th>料号</th>' +
        '<th>品名</th>' +
        '<th>规格</th>' +
        '<th>位置</th>' +
        '<th style="text-align:right;min-width:80px">现有库存</th>' +
        '<th style="text-align:right;min-width:80px">安全库存</th>' +
      '</tr></thead><tbody>';
    for (var j = 0; j < below.length; j++) {
      var row = below[j];
      var it = row.it;
      var loc = row.loc;
      var safe = it.safeQty || 0;
      var qty = it.qty || 0;
      var isCrit = qty <= safe * 0.5; // 不足一半=严重
      var levelCls = isCrit ? "crit" : "low";
      var locStr = loc.shelf + "-" + loc.layer + "-" + loc.pos;
      html += '<tr class="' + levelCls + '">' +
        '<td class="col-itemno">' + (it.itemno || "—") + '</td>' +
        '<td>' + it.name + '</td>' +
        '<td style="color:#888">' + (it.spec || "—") + '</td>' +
        '<td class="col-loc">' + locStr + '</td>' +
        '<td class="col-qty">' + qty + (it.unit ? ' ' + it.unit : '') + '</td>' +
        '<td class="col-safe">' + safe + '</td>' +
      '</tr>';
    }
    html += '</tbody></table>';
    body.innerHTML = html;
  }

  document.getElementById("safeAlertOverlay").classList.add("show");
}

function updateSafeAlertBtn() {
  var count = 0;
  for (var k in DATA) {
    for (var i = 0; i < DATA[k].items.length; i++) {
      var it = DATA[k].items[i];
      if (it.name && it.qty > 0 && (it.safeQty || 0) > 0 && it.qty < it.safeQty) count++;
    }
  }
  var badge = document.getElementById("safeAlertBadge");
  if (count > 0) {
    badge.textContent = count;
    badge.style.display = "inline-block";
  } else {
    badge.textContent = "";
    badge.style.display = "none";
  }
}

// ===== 更新统计 =====
// 统计对象：
//   货位：至少有1个物料且有库存
//   总库位：所有货位数量
//   已占用：有物料且qty>0的货位数量
//   空闲：空货位数量
//   库存告警：有安全库存且qty<安全库存的物料行数
function updateStats() {
  var allLocs = Object.keys(DATA).map(function(k) { return DATA[k]; });
  var occupiedLocs = 0;
  var alertItems = 0;

  for (var i = 0; i < allLocs.length; i++) {
    var items = allLocs[i].items;
    var hasOccupied = items.some(function(it) { return it.name && it.qty > 0; });
    if (hasOccupied) occupiedLocs++;
    for (var j = 0; j < items.length; j++) {
      var it = items[j];
      if (it.name && it.qty > 0) {
        var safe = it.safeQty || 0;
        if (safe > 0 && it.qty < safe) alertItems++;
      }
    }
  }
  var emptyLocs = allLocs.length - occupiedLocs;
  document.getElementById("s-total").textContent = allLocs.length;
  document.getElementById("s-occ").textContent = occupiedLocs;
  document.getElementById("s-empty").textContent = emptyLocs;
  document.getElementById("s-alert").textContent = alertItems;
}

// ===== 自动检测本地 data.xlsx / data.json =====
// （同上版本，保留兼容性）
(function autoLoad() {
  // 优先尝试 xlsx
  var xhr = new XMLHttpRequest();
  xhr.open("GET", "data.xlsx?t=" + Date.now(), true);
  xhr.onerror = function() {
    // 降级尝试 json
    var xhr2 = new XMLHttpRequest();
    xhr2.open("GET", "data.json?t=" + Date.now(), true);
    xhr2.onreadystatechange = function() {
      if (xhr2.readyState === 4 && xhr2.status === 200) {
        try {
          var json = JSON.parse(xhr2.responseText);
          DATA = {};
          var shelves = new Set();
          for (var i = 0; i < json.length; i++) {
            var row = json[i];
            var rawCode = row["库位编码"] || row["库位"] || row["code"] || "";
            if (!rawCode) continue;
            var conv = convertCode(rawCode);
            if (!conv.code) continue;
            var code = conv.code;
            var qty = parseFloat(row["数量"] || row["可用量"] || "0") || 0;
            var name = row["物料名称"] || row["品名"] || "";
            var itemno = row["料号"] || "";
            var spec = row["规格型号"] || row["规格"] || "";
            var img = row["物料图片路径"] || "";
            var note = row["备注"] || "";
            var unit = row["单位"] || "";
            var parts = code.split("-");
            var shelf = parts[0] || "";
            var layer = parts[1] ? parseInt(parts[1].replace("L", "")) : 1;
            var pos = parts[2] ? parseInt(parts[2].replace("P", "")) : 1;
            if (!DATA[code]) {
              DATA[code] = { code: code, disp: conv.raw, shelf: shelf, layer: layer, pos: pos, items: [] };
              shelves.add(shelf);
            }
            var safeQty = parseFloat(row["安全库存"] || "0") || 0;
            DATA[code].items.push({ itemno: itemno, name: name, spec: spec, qty: qty, unit: unit, safeQty: safeQty, img: itemno ? "images/" + itemno + ".jpg" : "", note: note, _raw: { "单位": unit } });
          }
          var shelfList = Array.from(shelves).sort();
          document.getElementById("fileName").textContent = "data.json (已自动加载)";
          renderBoard(shelfList);
          updateStats();
          updateSafeAlertBtn();
          showToast("✅ 自动加载 data.json，共 " + Object.keys(DATA).length + " 货位");
        } catch(e) { console.log("json 解析失败:", e.message); }
      }
    };
    xhr2.send();
  };
  xhr.onload = function() {
    if (xhr.status === 200) {
      try {
        var workbook = XLSX.read(new Uint8Array(xhr.response), {type: "array"});
        var json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {defval: ""});
        DATA = {};
        var shelves = new Set();
        for (var i = 0; i < json.length; i++) {
          var row = json[i];
          var conv = convertCode(getVal(row, KEY_CODE, ""));
          if (!conv.code) continue;
          var code = conv.code;
          var item = {
            itemno: getVal(row, KEY_ITEMNO, ""),
            name: getVal(row, KEY_NAME, ""),
            spec: getVal(row, KEY_SPEC, ""),
            qty: parseFloat(getVal(row, KEY_QTY, "0")) || 0,
            unit: getVal(row, KEY_UNIT, ""),
            safeQty: parseFloat(getVal(row, KEY_SAFE, "0")) || 0,
            img: getVal(row, KEY_IMG, ""),
            note: getVal(row, KEY_NOTE, ""),
            _raw: row
          };
          if (!DATA[code]) {
            var parts = conv.raw.split("-");
            DATA[code] = { code: code, disp: conv.raw, shelf: parts[0], layer: parseInt(parts[1].replace("L","")), pos: parseInt(parts[2].replace("P","")), items: [] };
            shelves.add(parts[0]);
          }
          DATA[code].items.push(item);
        }
        var shelfList = Array.from(shelves).sort();
        document.getElementById("fileName").textContent = "data.xlsx (已自动加载)";
        renderBoard(shelfList);
        updateStats();
        updateSafeAlertBtn();
        showToast("✅ 自动加载 data.xlsx，共 " + Object.keys(DATA).length + " 货位");
      } catch(e) { console.log("xlsx 解析失败:", e.message); }
    } else {
      xhr.onerror();
    }
  };
  xhr.send();
})();

// ===== 平面图配置（从map.svg解析）=====
var FLOOR_CONFIG = {
  "svg_w": 1481,
  "svg_h": 726,
  "svg_file": "map.svg",
  "shelves": {
    "C": {"x":0,"y":0,"w":480,"h":60,"orient":"h"},
    "D": {"x":480,"y":0,"w":320,"h":60,"orient":"h"},
    "B": {"x":0,"y":80,"w":60,"h":640,"orient":"v"},
    "F": {"x":140,"y":140,"w":60,"h":440,"orient":"v"},
    "G": {"x":200,"y":140,"w":60,"h":440,"orient":"v"},
    "I": {"x":410,"y":140,"w":60,"h":440,"orient":"v"},
    "H": {"x":350,"y":140,"w":60,"h":440,"orient":"v"},
    "K": {"x":625,"y":140,"w":60,"h":440,"orient":"v"},
    "J": {"x":565,"y":140,"w":60,"h":440,"orient":"v"},
    "E": {"x":900,"y":65,"w":60,"h":480,"orient":"v"},
    "A": {"x":60,"y":660,"w":325,"h":60,"orient":"h"}
  }
};

var _floorViewActive = false;

function getShelfStatus(letter) {
  var hasItems = false, hasCrit = false, hasLow = false;
  for (var k in DATA) {
    if (DATA[k].shelf !== letter) continue;
    var items = DATA[k].items;
    if (items.length === 0) continue;
    hasItems = true;
    for (var i = 0; i < items.length; i++) {
      var it = items[i];
      var q = it.qty || 0;
      var safe = it.safeQty || 0;
      // 安全库存判断：q > 0（有库存）且 safe > 0（有安全库存设置）且 q < safe（低于安全库存）
      if (q > 0 && safe > 0 && q < safe) { hasCrit = true; }
      else if (q > 0 && safe > 0 && q < safe * 2) { hasLow = true; }
    }
  }
  var result = !hasItems ? "empty" : hasCrit ? "crit" : hasLow ? "low" : "ok";
  // 调试输出
  if (typeof console !== 'undefined') {
    console.log('[getShelfStatus] letter=' + letter + ', hasItems=' + hasItems + ', hasCrit=' + hasCrit + ', hasLow=' + hasLow + ' => ' + result);
  }
  return result;
}

function getShelfFill(letter) {
  var st = getShelfStatus(letter);
  if (st === "crit") return "#d94040";
  if (st === "low") return "#e09000";
  if (st === "empty") return "#253a50";
  return "#1e5080";
}

function getShelfBorder(letter) {
  // 焦点货架优先级最高（橙色）
  if (_focusShelf === letter) return "#ff9900";
  var st = getShelfStatus(letter);
  if (st === "crit") return "#ff5c5c";
  if (st === "low") return "#ffaa30";
  if (st === "empty") return "#3a5a7a";
  return "#67d8f0";
}

function getShelfStats(letter) {
  var total = 0, occ = 0, crit = 0, low = 0;
  for (var k in DATA) {
    if (DATA[k].shelf !== letter) continue;
    var items = DATA[k].items;
    for (var i = 0; i < items.length; i++) {
      total++;
      var q = items[i].qty || 0;
      if (q > 0) occ++;
      var safe = items[i].safeQty || 0;
      if (q > 0 && safe > 0 && q < safe) crit++;
      else if (q > 0 && safe > 0 && q < safe * 2) low++;
    }
  }
  return {total: total, occ: occ, crit: crit, low: low};
}

function renderFloorPlan() {
  var container = document.getElementById("floorPlanContainer");
  var board = document.getElementById("board");
  var cfg = FLOOR_CONFIG;
  var svg_w = cfg.svg_w, svg_h = cfg.svg_h;
  var svg_file = cfg.svg_file || "map.svg";

  // 统一用窗口尺寸（减去顶部header和右侧panel），初始/切换时完全一致
  var availW = (window.innerWidth || 800) - 0 - 370;
  var availH = (window.innerHeight || 600) - 60 - 0;
  var scale = Math.min(availW / svg_w, availH / svg_h);
  var dispW = Math.round(svg_w * scale);
  var dispH = Math.round(svg_h * scale);

  fetch(svg_file)
    .then(function(r) { return r.text(); })
    .then(function(svgText) {
      var parser = new DOMParser();
      var svgEl = parser.parseFromString(svgText, "image/svg+xml").documentElement;

      svgEl.setAttribute("class", "floor-plan-svg");
      svgEl.setAttribute("viewBox", "0 0 " + svg_w + " " + svg_h);
      // 设置 SVG 宽高（与 svgWrap 一致）
      svgEl.style.width = dispW + "px";
      svgEl.style.height = dispH + "px";
      // 去掉 viewBox 等比限制，用 CSS 撑满
      // viewBox 保留，确保 SVG 坐标系统正确映射到 dispW/dispH

      for (var letter in cfg.shelves) {
        var rect = svgEl.querySelector("#shelf-" + letter);
        if (!rect) continue;

        var fill = getShelfFill(letter);
        var stroke = getShelfBorder(letter);
        var stats = getShelfStats(letter);
        var strokeW = (_focusShelf === letter) ? "5" : "3";
        rect.setAttribute("fill", fill);
        rect.setAttribute("stroke", stroke);
        rect.setAttribute("stroke-width", strokeW);
        if (_focusShelf === letter) {
          rect.classList.add("svg-shelf-focus");
          // 获取当前 rect 的坐标
          var curX = parseFloat(rect.getAttribute("x")) || 0;
          var curY = parseFloat(rect.getAttribute("y")) || 0;
          var curW = parseFloat(rect.getAttribute("width")) || 100;
          var curH = parseFloat(rect.getAttribute("height")) || 50;
          // 创建高亮矩形覆盖在 rect 上方（不要隐藏 rect，否则无法接收点击）
          var focusRect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
          focusRect.setAttribute('x', curX);
          focusRect.setAttribute('y', curY);
          focusRect.setAttribute('width', curW);
          focusRect.setAttribute('height', curH);
          focusRect.setAttribute('fill', fill);
          focusRect.setAttribute('fill-opacity', '0.5');
          focusRect.setAttribute('stroke', '#ff9900');
          focusRect.setAttribute('stroke-width', '6');
          focusRect.setAttribute('rx', '8');
          focusRect.classList.add('svg-shelf-focus');
          // 高亮矩形不拦截鼠标事件，点击穿透到底层 rect
          focusRect.style.pointerEvents = 'none';
          // 将高亮矩形插入到文字标签之前，这样文字能正常显示
          var textGroup = svgEl.querySelector('#shelf-text-group-' + letter);
          if (textGroup && textGroup.parentNode) {
            textGroup.parentNode.insertBefore(focusRect, textGroup);
          } else {
            svgEl.appendChild(focusRect);
          }
        } else {
          rect.classList.remove("svg-shelf-focus");
        }

        rect.addEventListener("click", (function(l) { return function() { showLayers(l); }; })(letter));
        rect.addEventListener("mouseover", (function(l, st) { return function(e) { floorTip(e, l, st.total, st.occ, st.crit, st.low); }; })(letter, stats));
        rect.addEventListener("mouseout", floorHideTip);

        // 给货架容器也添加点击事件（解决点击文字无效问题）
        var cellId = rect.closest('g[data-cell-id]');
        if (cellId) {
          cellId.style.cursor = 'pointer';
          cellId.addEventListener('click', (function(l) { return function(e) { e.stopPropagation(); showLayers(l); }; })(letter));
        }
      }

      // 外层：裁剪（收住 hint/tip 不超出）
      var wrapper = document.createElement("div");
      wrapper.style.position = "relative";
      wrapper.style.display = "block";
      wrapper.style.width = dispW + "px";
      wrapper.style.height = dispH + "px";
      // overflow: visible 让 drop-shadow 完整显示（hint/tip 用 absolute 限制在 svgWrap 内）
      wrapper.style.overflow = "visible";

      // 内层：不禁 clip，让 drop-shadow/glow 完整显示
      var svgWrap = document.createElement("div");
      svgWrap.style.position = "relative";
      svgWrap.style.display = "inline-block";
      svgWrap.style.overflow = "visible";
      svgWrap.style.width = dispW + "px";
      svgWrap.style.height = dispH + "px";
      svgWrap.appendChild(svgEl);
      wrapper.appendChild(svgWrap);

      // hint/tip 用 absolute 限制在 svgWrap 内，防止溢出
      svgWrap.style.position = "relative";
      var hint = document.createElement("div");
      hint.className = "floor-hint";
      hint.style.cssText = "position:absolute;bottom:8px;left:50%;transform:translateX(-50%);pointer-events:none";
      hint.textContent = "\ud83d\udccc \u70b9\u51fb\u8d27\u67b6\u8fdb\u5165\u5c42\u6570\u9009\u62e9";
      svgWrap.appendChild(hint);

      var tip = document.createElement("div");
      tip.id = "floorTip";
      tip.className = "floor-tip";
      tip.style.cssText = "position:absolute;pointer-events:none";
      svgWrap.appendChild(tip);

      container.innerHTML = "";
      container.appendChild(wrapper);
      // 显示平面图，隐藏货架视图
      container.style.display = "flex";
      var board = document.getElementById("board");
      board.style.display = "none";
      // 更新按钮文字：当前是平面图模式，显示"货架视图"
      var btn = document.getElementById("viewToggleBtn");
      if (btn) btn.textContent = "\ud83d\udce6 \u8d27\u67b6\u89c6\u56fe";
    })
    .catch(function(err) {
      container.innerHTML = '<div style="color:red;padding:20px;">\u5e73\u9762\u56fe\u52a0\u8f7d\u5931\u8d25: ' + err + '</div>';
    });
}

function floorTip(e, letter, total, occ, crit, low) {
  var tip = document.getElementById("floorTip");
  if (!tip) return;
  var parts = [];
  if (total === 0) parts.push("\u7a7a\u8d27\u67b6");
  else {
    parts.push("\u5df2\u5360\u7528 " + occ + "/" + total);
    if (crit > 0) parts.push("\u26a0\ufe0f \u544a\u8b66 " + crit);
    if (low > 0) parts.push("\u26a1 \u4f4e\u4f4d " + low);
  }
  tip.textContent = "\u8d27\u67b6" + letter + "\uff1a" + parts.join(" | ");
  tip.style.display = "block";
  var rect = e.target.closest('svg').getBoundingClientRect();
  tip.style.left = (e.clientX - rect.left + 10) + "px";
  tip.style.top = (e.clientY - rect.top - 30) + "px";
}

function floorHideTip() {
  var tip = document.getElementById("floorTip");
  if (tip) tip.style.display = "none";
}

function toggleView() {
  var board = document.getElementById("board");
  var floorCont = document.getElementById("floorPlanContainer");
  var btn = document.getElementById("viewToggleBtn");

  _floorViewActive = !_floorViewActive;

  if (_floorViewActive) {
    // 显示平面图
    renderFloorPlan();
    btn.textContent = "\ud83d\udce6 \u8d27\u67b6\u89c6\u56fe";
  } else {
    // 显示货架视图
    board.style.display = "";
    floorCont.style.display = "none";
    btn.textContent = "\ud83d\udcd0 \u5e73\u9762\u56fe";
    // 切回货架视图时恢复当前选中货架的显示
    if (_focusShelf) showLayers(_focusShelf);
  }
}




// ===== 查询弹窗 =====
var SEARCH_LIMIT = 20;
var _searchAll = false;
var _focusShelf = null;         // 焦点货架（点击或搜索设置，覆盖式单选）
var _focused = false;             // 是否处于焦点模式

function showSearchModal() {
  if (Object.keys(DATA).length === 0) { showToast("\u26a0\ufe0f 请先加载数据"); return; }
  _searchAll = false;
  clearFocus();
  document.getElementById("searchInput").value = "";
  document.getElementById("searchHint").textContent = "输入关键词实时搜索，支持料号/品名/规格/库位/备注";
  document.getElementById("searchBody").innerHTML = "";
  document.getElementById("searchOverlay").classList.add("show");
  document.getElementById("searchInput").focus();
}

function closeSearch(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById("searchOverlay").classList.remove("show");
  clearFocus();
}

function onSearchKeydown(e) {
  if (e.key === "Enter") { doSearch(true); }
}

function onSearchInput() {
  var val = document.getElementById("searchInput").value.trim();
  if (val === "") {
    document.getElementById("searchHint").textContent = "输入关键词实时搜索，支持料号/品名/规格/库位/备注";
    document.getElementById("searchBody").innerHTML = "";
    return;
  }
  doSearch(false);
}

function doSearch(full) {
  if (full) _searchAll = true;
  var val = document.getElementById("searchInput").value.trim();
  if (!val) return;
  var kw = val.toLowerCase();
  var results = [];
  for (var code in DATA) {
    var loc = DATA[code];
    for (var i = 0; i < loc.items.length; i++) {
      var it = loc.items[i];
      if (!it.name && it.qty === 0) continue;
      if (matchItem(it, loc, kw)) {
        results.push({ loc: loc, it: it });
      }
    }
  }
  renderSearchResults(results, val);
}

function matchItem(it, loc, kw) {
  var fields = [loc.code, it.itemno, it.name, it.spec, it.note];
  for (var f = 0; f < fields.length; f++) {
    if (fields[f] && String(fields[f]).toLowerCase().indexOf(kw) !== -1) return true;
  }
  return false;
}

function renderSearchResults(results, rawKw) {
  var body = document.getElementById("searchBody");
  var hint = document.getElementById("searchHint");
  if (results.length === 0) {
    body.innerHTML = "";
    hint.textContent = "未找到匹配结果";
    return;
  }
  var limit = _searchAll ? results.length : SEARCH_LIMIT;
  var shown = results.slice(0, limit);
  var html = '<table class="search-table"><thead><tr>' +
    '<th>库位</th><th>料号</th><th>品名</th><th>规格</th><th style="text-align:right">数量</th><th style="text-align:right">安全库存</th><th>操作</th>' +
  '</tr></thead><tbody>';
  for (var i = 0; i < shown.length; i++) {
    var row = shown[i];
    var it = row.it;
    var loc = row.loc;
    var locStr = loc.shelf + "-" + loc.layer + "-" + loc.pos;
    var unit = it.unit || "";
    var safe = it.safeQty || 0;
    var qtyStyle = (it.qty > 0 && safe > 0 && it.qty < safe)
      ? (it.qty <= safe * 0.5 ? 'color:#e74c3c' : 'color:#f39c12')
      : '';
    html += '<tr onclick="navigateToLoc(\'' + loc.code + '\')">' +
      '<td class="col-loc">' + locStr + '</td>' +
      '<td class="col-itemno">' + hl(it.itemno || "\u2014", rawKw) + '</td>' +
      '<td class="truncated">' + hl(it.name || "\u2014", rawKw) + '</td>' +
      '<td class="truncated">' + hl(it.spec || "\u2014", rawKw) + '</td>' +
      '<td class="col-qty"' + (qtyStyle ? ' style="' + qtyStyle + '"' : '') + '>' + it.qty + (unit ? " " + unit : "") + '</td>' +
      '<td style="text-align:right;color:#888">' + (safe > 0 ? safe : '—') + '</td>' +
    '</tr>';
  }
  html += '</tbody></table>';
  body.innerHTML = html;
  if (_searchAll && results.length > SEARCH_LIMIT) {
    hint.innerHTML = '共 <span style="color:#4cc9f0">' + results.length + '</span> 条，已显示全部';
  } else if (results.length > SEARCH_LIMIT) {
    hint.textContent = '共 ' + results.length + ' 条匹配结果';
  } else {
    hint.textContent = '共 ' + results.length + ' 条匹配结果';
  }
}

function hl(text, kw) {
  if (!kw || !text) return text;
  var idx = text.toLowerCase().indexOf(kw.toLowerCase());
  if (idx === -1) return text;
  return text.substring(0, idx) + '<span class="search-hl">' + text.substring(idx, idx + kw.length) + '</span>' + text.substring(idx + kw.length);
}

function navigateToLoc(code) {
  closeSearch();
  var loc = DATA[code];
  if (!loc) return;

  _focusShelf = loc.shelf;
  _focused = true;

  showLayers(loc.shelf);
  setTimeout(function() {
    var cards = document.querySelectorAll(".layer-card");
    for (var ci = 0; ci < cards.length; ci++) {
      var title = cards[ci].querySelector(".layer-card-title");
      if (title && title.textContent.indexOf("第 " + loc.layer + " 层") !== -1) {
        cards[ci]._grid.style.display = "flex";
        cards[ci]._arrow.textContent = "\u25bc";
        break;
      }
    }
    showModal(loc);
  }, 100);
}

function clearFocus() {
  _focusShelf = null;
  _focused = false;
  // 平面图焦点高亮由 renderFloorPlan 通过 class 处理
}





function scrollToLayerCard(layer) {
  var cards = document.querySelectorAll(".layer-card");
  for (var i = 0; i < cards.length; i++) {
    var title = cards[i].querySelector(".layer-card-title");
    if (title && title.textContent.indexOf("第 " + layer + " 层") !== -1) {
      cards[i].scrollIntoView({ behavior: "smooth", block: "center" });
      return;
    }
  }
}

function highlightSlot(loc) {
  var dots = document.querySelectorAll(".pos-dot");
  for (var i = 0; i < dots.length; i++) {
    var title = dots[i].title || "";
    // 同时匹配disp(原始格式如A-1-7)和code(内部格式如A-L1-P007)
    var searchKey = loc.disp || loc.code;
    if (title.indexOf(searchKey) === 0) {
      var el = dots[i];
      el.style.boxShadow = "0 0 16px 4px #4cc9f0";
      el.style.zIndex = "10";
      el.style.transform = "scale(1.3)";
      setTimeout(function() {
        el.style.boxShadow = "";
        el.style.zIndex = "";
        el.style.transform = "";
      }, 3000);
      return;
    }
  }
}

// ===== ESC 关闭搜索弹窗 =====
document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") { closeModal(); closeSafeAlert(); closeSearch(); clearFocus(); }
})
window.onload = function() {
  // 默认显示平面图
  _floorViewActive = true;
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      renderFloorPlan();
    });
  });
};
